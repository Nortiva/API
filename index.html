<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nortiva API</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <header>

            <div>
                <h1>Nortiva</h1>
                <span>API - BETA SOURCE</span>
            </div>

            <div class="status">
                <span class="dot"></span>
                <span id="apiStatus">Carregando...</span>
            </div>

        </header>

        <main>

            <div class="card">
                <p>Empresa</p>
                <h2 id="company">-</h2>
            </div>

            <div class="card">
                <p>Projetos</p>
                <h2 id="projects">0</h2>
            </div>

            <div class="card">
                <p>Usuários</p>
                <h2 id="users">0</h2>
            </div>

            <div class="card">
                <p>Versão</p>
                <h2 id="version">-</h2>
            </div>

        </main>

        <footer>

            Última atualização:
            <span id="time">--:--:--</span>

        </footer>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
